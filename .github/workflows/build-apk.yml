name: Build Android APK

# Build the Right Way Android APK in the cloud and publish it as a
# downloadable artifact. Run it manually from the Actions tab (Run workflow),
# or it fires automatically when native/Capacitor files change.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'client/android/**'
      - 'client/capacitor.config.json'
      - 'client/package.json'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 36 + build-tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" >/dev/null
          sdkmanager "build-tools;36.0.0" >/dev/null 2>&1 || echo "build-tools 36.0.0 unavailable; AGP will select an installed version"

      - name: Install web dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor (regenerates plugin modules + copies web)
        run: npx cap sync android

      - name: Bump versionCode from run number
        working-directory: client/android/app
        run: |
          sed -i -E "s/versionCode [0-9]+/versionCode $((100 + GITHUB_RUN_NUMBER))/" build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"1.1.${GITHUB_RUN_NUMBER}\"/" build.gradle
          grep -E "versionCode|versionName" build.gradle

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "RELEASE_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "🔐 Release keystore configured — building a SIGNED release APK"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No ANDROID_KEYSTORE_BASE64 secret — building a debug APK"
          fi

      - name: Build APK
        working-directory: client/android
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "${{ steps.keystore.outputs.present }}" = "true" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Collect APK
        run: |
          if [ "${{ steps.keystore.outputs.present }}" = "true" ]; then
            SRC=android/app/build/outputs/apk/release/app-release.apk
          else
            SRC=android/app/build/outputs/apk/debug/app-debug.apk
          fi
          cp "$SRC" "rightway-v1.1.${GITHUB_RUN_NUMBER}.apk"
          echo "APK_NAME=rightway-v1.1.${GITHUB_RUN_NUMBER}.apk" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rightway-apk
          path: client/${{ env.APK_NAME }}
          if-no-files-found: error
          retention-days: 90
