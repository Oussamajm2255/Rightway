name: Build Android APK

# Build the Right Way Android APK in the cloud and publish it as a
# downloadable artifact. Run it manually from the Actions tab (Run workflow),
# or it fires automatically when native/Capacitor files change.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'client/android/**'
      - 'client/capacitor.config.json'
      - 'client/package.json'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 36 + build-tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" >/dev/null
          sdkmanager "build-tools;36.0.0" >/dev/null 2>&1 || echo "build-tools 36.0.0 unavailable; AGP will select an installed version"

      - name: Install web dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor (regenerates plugin modules + copies web)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk rightway-v1.1.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rightway-apk
          path: client/rightway-v1.1.apk
          if-no-files-found: error
          retention-days: 90
