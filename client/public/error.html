<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Right Way — Connexion</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0A0A0B;
      color: #fff;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);
      -webkit-user-select: none; user-select: none;
    }
    .wrap { max-width: 340px; width: 100%; }
    .logo { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; }
    .logo .dot { color: #E10600; }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 22px;
      border-radius: 50%;
      background: rgba(225, 6, 0, 0.12);
      display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 19px; font-weight: 700; margin: 22px 0 8px; }
    p { font-size: 14px; line-height: 1.5; color: #9A9AA2; margin-bottom: 26px; }
    button {
      appearance: none; border: none; cursor: pointer;
      background: #E10600; color: #fff;
      font-size: 15px; font-weight: 600;
      padding: 13px 20px; width: 100%;
      border-radius: 12px;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(0.98); opacity: .9; }
    .hint { margin-top: 16px; font-size: 12px; color: #57575E; }
    .spin { display: none; }
    button.loading .label { display: none; }
    button.loading .spin { display: inline-block; animation: sp 0.8s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#E10600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.58 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" />
      </svg>
    </div>
    <div class="logo">Right Way<span class="dot">.</span></div>
    <h1>Connexion au serveur perdue</h1>
    <p>Impossible de joindre le serveur. Vérifiez votre connexion internet, puis réessayez.</p>
    <button id="retry" onclick="retry()">
      <span class="label">Réessayer</span>
      <span class="spin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 12a9 9 0 11-6.2-8.5" />
        </svg>
      </span>
    </button>
    <div class="hint">Right Way — Distribution</div>
  </div>
  <script>
    var APP_URL = 'https://rightway-production-384a.up.railway.app/';
    function retry() {
      var b = document.getElementById('retry');
      b.classList.add('loading');
      // Small delay so the spinner is visible, then re-attempt the live app.
      setTimeout(function () { window.location.href = APP_URL; }, 400);
    }
    // Auto-retry once connectivity returns.
    window.addEventListener('online', function () { window.location.href = APP_URL; });
  </script>
</body>
</html>
